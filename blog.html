<body>

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo"><img src="images/icon.jpg" alt="" class="logo-icon">sanba</a>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="index.html#about">About</a></li>
          <li><a href="index.html#works">Works</a></li>
          <li><a href="blog.html" class="active">Blog</a></li>
        </ul>
      </nav>
      <button class="nav-toggle" aria-label="メニューを開く">☰</button>
    </div>
  </header>

  <section class="hero" style="padding: 64px 0 40px;">
    <div class="container">
      <p class="hero-eyebrow">Blog</p>
      <h1 style="font-size: clamp(1.8rem, 4vw, 2.4rem);">記事一覧</h1>
      <p>noteに投稿した記事をこちらにまとめています。タイトルをクリックするとnoteの記事ページに移動します。</p>
    </div>
  </section>

  <section class="section">
    <div class="container">

      <!--
        note記事の追加方法:
        1. note.comの記事ページを開く
        2. 記事のURLをコピーする（例: https://note.com/your_id/n/xxxxxxxxxxxx）
        3. 下の post-item をコピーして増やし、href と本文を差し替える
        4. サムネイル画像を使いたい場合は post-thumb の中に <img src="..."> を追加する

        note公式の埋め込み（記事本文をそのまま表示）を使いたい場合は、
        note記事の「共有」→「埋め込み」からコードを取得し、
        <div class="note-embed-wrap"> の中に貼り付けてください。
      -->

      <div class="post-list">

        <a class="post-item" href="https://note.com/babasanban/n/n539d4e9d6f42" target="_blank" rel="noopener">
          <div class="post-thumb"><img src="https://assets.st-note.com/production/uploads/images/255484271/rectangle_large_type_2_da117e3b2fab389008bc8468d8bcd06c.png?fit=bounds&quality=85&width=1280" alt=""></div>
          <div class="post-content">
            <p class="post-date">2026.03.01</p>
            <h3>仮想環境を使って古いゲームを安定してプレイしよう</h3>
            <span class="post-source">noteで読む</span>
          </div>
        </a>

        <a class="post-item" href="https://note.com/babasanban/n/n5dd263d4357a" target="_blank" rel="noopener">
          <div class="post-thumb"><img src="https://assets.st-note.com/production/uploads/images/236853178/rectangle_large_type_2_01c756089edc39520f109a4f0036ff5a.png?fit=bounds&quality=85&width=1280" alt=""></div>
          <div class="post-content">
            <p class="post-date">2025.12.19</p>
            <h3>大学からのノベルゲー初心者レポ～しんどゲー編～</h3>
            <span class="post-source">noteで読む</span>
          </div>
        </a>

      </div>

      <!-- note公式埋め込みを使う場合のサンプル（コメントを外して使用）
      <div class="note-embed-wrap">
        <iframe class="note-embed" src="https://note.com/embed/notes/xxxxxxxxxxxx" style="height:143px;" scrolling="no" frameborder="0"></iframe>
        <script src="https://note.com/scripts/embed.js" charset="utf-8" async></script>
      </div>
      -->

    </div>
  </section>

  <footer class="site-footer">
    <div class="container" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">

      </ul>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
